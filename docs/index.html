<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOReader AppStore</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;
  --card:#16213e;--card-hover:#1a2744;
  --text:#e0e0e0;--text2:#a0a0b0;--text3:#707088;
  --accent:#e94560;--accent2:#ff6b6b;
  --border:#2a2a4a;--input-bg:#0f1a30;
  --star:#f5c518;--tag:#533483;
  --success:#4caf50;--warn:#ff9800;
  --radius:8px;--shadow:0 2px 8px rgba(0,0,0,.3);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --filter-banner-bg:#2a1a24;
  --overlay-bg:rgba(0,0,0,.45);
  --modal-overlay:rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#d0d7e3;
  --card:#ffffff;--card-hover:#f5f7fa;
  --text:#1a1a2e;--text2:#555568;--text3:#888898;
  --accent:#d6336c;--accent2:#c2255c;
  --border:#d0d5dd;--input-bg:#f8f9fb;
  --star:#e6a800;--tag:#e8dff5;
  --success:#2e7d32;--warn:#e65100;
  --shadow:0 2px 8px rgba(0,0,0,.08);
  --filter-banner-bg:#fde8ee;
  --overlay-bg:rgba(0,0,0,.25);
  --modal-overlay:rgba(0,0,0,.35);
}
html{font-size:15px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--radius);padding:.5rem 1rem;font-size:.9rem;transition:background .15s,transform .1s}
button:active{transform:scale(.97)}
input,select{font-family:inherit;font-size:.9rem;border:1px solid var(--border);border-radius:var(--radius);padding:.5rem .75rem;background:var(--input-bg);color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem 1.5rem;position:sticky;top:0;z-index:100;transition:transform .25s ease}
.controls{transition:transform .25s ease}
.header.hidden{transform:translateY(-100%)}
.controls.hidden{transform:translateY(-100%)}
.header-top{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.header h1{font-size:1.4rem;font-weight:700;color:var(--text);flex-shrink:0}
.header h1 span{color:var(--accent)}
.header-actions{margin-left:auto;display:flex;gap:.5rem;align-items:center}

/* Tabs */
.tabs{display:flex;gap:0;margin-top:.75rem}
.tab-btn{background:transparent;color:var(--text2);padding:.5rem 1.25rem;border-bottom:2px solid transparent;border-radius:0;font-weight:500;font-size:.95rem}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Controls bar */
.controls{display:flex;gap:.75rem;padding:.75rem 1.5rem;background:var(--bg);align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);position:sticky;z-index:99}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding-left:2.2rem}
.search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.9rem;pointer-events:none}
/* Filter banner */
.filter-banner{display:none;align-items:center;gap:.6rem;padding:.5rem 1.5rem;background:var(--filter-banner-bg);border-bottom:1px solid var(--accent);font-size:.85rem;color:var(--accent2);position:sticky;z-index:98;transition:transform .25s ease}
.filter-banner.hidden{transform:translateY(-100%)}
.filter-banner.visible{display:flex}
.filter-banner .filter-text{flex:1}
.filter-banner .filter-clear{background:none;color:var(--accent2);font-size:1.1rem;padding:.2rem .5rem;border-radius:4px;line-height:1}
.filter-banner .filter-clear:hover{background:rgba(233,69,96,.2)}
/* Search overlay */
.search-overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:150;align-items:center;justify-content:center;flex-direction:column;gap:.75rem}
.search-overlay.visible{display:flex}
.search-overlay-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem 2.5rem;text-align:center;box-shadow:var(--shadow)}
.search-overlay-box .spinner{width:32px;height:32px}
/* Min stars input */
.min-stars-box{display:flex;align-items:center;gap:.3rem;font-size:.8rem;color:var(--text3)}
.min-stars-box input{width:70px;text-align:center;padding:.35rem .5rem;font-size:.8rem}
.sort-select{min-width:180px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text)}
.btn-secondary:hover{background:var(--card-hover);border:1px solid var(--border)}
.btn-icon{background:transparent;color:var(--text2);padding:.5rem;font-size:1.2rem;line-height:1}
.btn-icon:hover{color:var(--text)}

/* Stats bar */
.stats-bar{padding:.4rem 1.5rem;color:var(--text3);font-size:.8rem;display:flex;gap:1rem;align-items:center}

/* Repo list */
.repo-list{padding:1rem 1.5rem;display:flex;flex-direction:column;gap:.75rem}
.repo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;transition:background .15s,border-color .15s;cursor:default}
.repo-card:hover{background:var(--card-hover);border-color:var(--bg3)}
.repo-card-header{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:.4rem}
.repo-name{font-weight:600;font-size:1rem;color:var(--accent2);flex:1;word-break:break-word}
.repo-name a{color:inherit}
.repo-stars{color:var(--star);font-size:.85rem;white-space:nowrap;display:flex;align-items:center;gap:.25rem}
.repo-desc{color:var(--text2);font-size:.88rem;margin-bottom:.6rem;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.repo-meta{display:flex;gap:1rem;flex-wrap:wrap;font-size:.78rem;color:var(--text3);align-items:center}
.repo-meta-item{display:flex;align-items:center;gap:.3rem}
.lang-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.repo-topics{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.5rem}
.topic-tag{background:var(--tag);color:var(--text2);font-size:.7rem;padding:.15rem .5rem;border-radius:10px}
.repo-actions{margin-top:.6rem;display:flex;gap:.5rem}
.btn-sm{font-size:.78rem;padding:.3rem .7rem}
/* Fork badge */
.fork-badge{display:inline-flex;align-items:center;gap:.25rem;font-size:.72rem;color:var(--text3);background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:.15rem .55rem;cursor:pointer;position:relative;transition:color .15s,border-color .15s}
.fork-badge:hover{color:var(--accent2);border-color:var(--accent)}
.fork-popup{position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.5rem .75rem;font-size:.8rem;color:var(--text);white-space:nowrap;box-shadow:var(--shadow);z-index:10;display:none}
.fork-popup.visible{display:block}

/* Loading & empty states */
.state-msg{text-align:center;padding:3rem 1rem;color:var(--text3)}
.state-msg .icon{font-size:2.5rem;margin-bottom:.5rem}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:var(--modal-overlay);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:700px;max-height:85vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.modal-header{display:flex;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:1.1rem;flex:1}
.modal-body{padding:1.25rem;overflow-y:auto;flex:1}
.modal-footer{padding:.75rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end}

/* Settings form */
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:.3rem}
.form-group input{width:100%}
.form-hint{font-size:.75rem;color:var(--text3);margin-top:.25rem}
.token-status{display:inline-flex;align-items:center;gap:.3rem;font-size:.8rem;padding:.2rem .5rem;border-radius:4px}
.token-ok{color:var(--success);background:rgba(76,175,80,.12)}
.token-fail{color:var(--accent);background:rgba(233,69,96,.12)}

/* README modal */
.readme-content{font-size:.9rem;line-height:1.65;color:var(--text)}
.readme-content h1,.readme-content h2,.readme-content h3{margin:1rem 0 .5rem;color:var(--text)}
.readme-content h1{font-size:1.4rem;border-bottom:1px solid var(--border);padding-bottom:.3rem}
.readme-content h2{font-size:1.15rem;border-bottom:1px solid var(--border);padding-bottom:.2rem}
.readme-content h3{font-size:1rem}
.readme-content p{margin:.5rem 0}
.readme-content pre{background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;overflow-x:auto;font-size:.82rem;margin:.5rem 0}
.readme-content code{background:var(--input-bg);padding:.1rem .35rem;border-radius:3px;font-size:.85rem}
.readme-content pre code{background:none;padding:0}
.readme-content ul,.readme-content ol{margin:.5rem 0;padding-left:1.5rem}
.readme-content li{margin:.2rem 0}
.readme-content img{max-width:100%;border-radius:var(--radius)}
.readme-content blockquote{border-left:3px solid var(--accent);padding:.5rem 1rem;margin:.5rem 0;color:var(--text2);background:rgba(233,69,96,.05)}
.readme-content table{border-collapse:collapse;width:100%;margin:.5rem 0}
.readme-content th,.readme-content td{border:1px solid var(--border);padding:.4rem .6rem;text-align:left;font-size:.85rem}
.readme-content th{background:var(--bg3)}

/* Responsive */
@media(max-width:600px){
  .header{padding:.75rem 1rem}
  .controls{padding:.6rem 1rem}
  .repo-list{padding:.75rem}
  .repo-meta{gap:.5rem}
  .modal{max-width:100%;border-radius:8px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>📚 KOReader <span>AppStore</span></h1>
    <div class="header-actions">
      <button class="btn-icon" onclick="app.refreshData()" title="Refresh">🔄</button>
      <button class="btn-icon" id="themeToggle" onclick="app.toggleTheme()" title="Toggle theme">🌙</button>
      <button class="btn-icon" onclick="app.openSettings()" title="Settings">⚙️</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="plugins" onclick="app.switchTab('plugins')">Plugins</button>
    <button class="tab-btn" data-tab="patches" onclick="app.switchTab('patches')">Patches</button>
  </div>
</div>

<div class="controls">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search repos... (press Enter)" onkeydown="app.onSearchKeydown(event)">
  </div>
  <select class="sort-select" id="sortSelect" onchange="app.onSortChange(this.value)">
    <option value="stars_desc">⭐ Stars (high → low)</option>
    <option value="updated_desc">🕐 Recently updated</option>
    <option value="created_desc">📅 Newest first</option>
    <option value="name_asc">🔤 Name (A → Z)</option>
  </select>
  <div class="min-stars-box">
    <span>⭐ Min:</span>
    <input type="number" id="minStarsInput" min="0" value="0" onkeydown="app.onMinStarsKeydown(event)" onchange="app.onMinStarsChange(this.value)">
  </div>
  <label style="display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text3);cursor:pointer">
    <input type="checkbox" id="includeForks" checked onchange="app.onIncludeForksToggle(this.checked)"> Include Forks
  </label>
  <label style="display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text3);cursor:pointer">
    <input type="checkbox" id="readmeSearch" onchange="app.onReadmeSearchToggle(this.checked)"> Search README
  </label>
</div>

<div class="filter-banner" id="filterBanner">
  <span class="filter-text" id="filterText"></span>
  <button class="filter-clear" onclick="app.clearFilter()" title="Clear filter">✕</button>
</div>

<div class="search-overlay" id="searchOverlay">
  <div class="search-overlay-box">
    <div class="spinner"></div>
    <p style="margin-top:.5rem;color:var(--text2);font-size:.9rem" id="searchOverlayText">Searching...</p>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>
<div class="repo-list" id="repoList"></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>⚙️ Settings</h2>
      <button class="btn-icon" onclick="app.closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>GitHub Personal Access Token</label>
        <input type="password" id="patInput" placeholder="ghp_xxxxxxxxxxxx">
        <div class="form-hint">
          A token increases the API rate limit (10 → 30 req/min). 
          <a href="https://github.com/settings/tokens" target="_blank">Create token</a> (no scopes needed, public repo access is sufficient).
        </div>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center">
        <button class="btn-secondary btn-sm" onclick="app.testToken()">Test Token</button>
        <span id="tokenStatus"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="app.closeSettings()">Cancel</button>
      <button class="btn-primary" onclick="app.saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- Patches Files Modal -->
<div class="modal-overlay" id="patchesModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h2 id="patchesTitle">Patch Files</h2>
      <button class="btn-icon" onclick="app.closePatchFiles()">✕</button>
    </div>
    <div class="modal-body">
      <div id="patchesContent"></div>
    </div>
  </div>
</div>

<!-- README Modal -->
<div class="modal-overlay" id="readmeModal">
  <div class="modal" style="max-width:800px">
    <div class="modal-header">
      <h2 id="readmeTitle">README</h2>
      <button class="btn-icon" onclick="app.closeReadme()">✕</button>
    </div>
    <div class="modal-body">
      <div class="readme-content" id="readmeContent"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ─── Storage abstraction (localStorage with memory fallback) ───
const Storage = (() => {
  let mem = {};
  let hasLS = false;
  try { localStorage.setItem('__test__', '1'); localStorage.removeItem('__test__'); hasLS = true; } catch(e) {}
  return {
    get(k) { if (hasLS) { try { return localStorage.getItem(k); } catch(e) {} } return mem[k] || null; },
    set(k, v) { if (hasLS) { try { localStorage.setItem(k, v); return; } catch(e) {} } mem[k] = v; },
    remove(k) { if (hasLS) { try { localStorage.removeItem(k); return; } catch(e) {} } delete mem[k]; },
    getJSON(k) { const v = this.get(k); if (!v) return null; try { return JSON.parse(v); } catch(e) { return null; } },
    setJSON(k, v) { this.set(k, JSON.stringify(v)); },
    get persistent() { return hasLS; }
  };
})();

// ─── GitHub API client ───
const GitHub = {
  BASE: 'https://api.github.com',
  getHeaders() {
    const h = { 'Accept': 'application/vnd.github+json', 'User-Agent': 'KOReader-AppStore-Web' };
    const token = Storage.get('github_pat');
    if (token && token.trim()) h['Authorization'] = `token ${token.trim()}`;
    return h;
  },
  async request(path, query) {
    const url = query ? `${this.BASE}${path}?${query}` : `${this.BASE}${path}`;
    const res = await fetch(url, { headers: this.getHeaders() });
    if (!res.ok) throw new Error(`GitHub API ${res.status}: ${res.statusText}`);
    return res.json();
  },
  async searchRepos(q, sort = 'stars', order = 'desc', page = 1, perPage = 100) {
    const params = new URLSearchParams({ q, sort, order, page, per_page: perPage });
    return this.request('/search/repositories', params.toString());
  },
  async searchAllPages(q, sort = 'stars', order = 'desc') {
    const all = [];
    let page = 1;
    while (true) {
      const data = await this.searchRepos(q, sort, order, page, 100);
      const items = data.items || [];
      if (items.length === 0) break;
      all.push(...items);
      if (items.length < 100 || all.length >= 1000) break;
      page++;
    }
    return all;
  },
  async fetchRepoTree(owner, repo, ref = 'HEAD') {
    const cacheKey = `tree_${owner}/${repo}`;
    const cached = Storage.getJSON(cacheKey);
    if (cached && cached.tree && (Date.now() - cached.ts < 3600000)) return cached.tree;
    const data = await this.request(`/repos/${owner}/${repo}/git/trees/${ref}`, 'recursive=1');
    const tree = data.tree || [];
    Storage.setJSON(cacheKey, { tree, ts: Date.now() });
    return tree;
  },
  async fetchReadme(owner, repo) {
    const cacheKey = `readme_${owner}/${repo}`;
    const cached = Storage.getJSON(cacheKey);
    if (cached && cached.content && (Date.now() - cached.ts < 3600000)) return cached.content;
    const data = await this.request(`/repos/${owner}/${repo}/readme`);
    let content = '';
    if (data.content) {
      const bin = atob(data.content.replace(/\n/g, ''));
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      content = new TextDecoder('utf-8').decode(bytes);
    }
    Storage.setJSON(cacheKey, { content, ts: Date.now() });
    return content;
  },
  async testAuth() {
    const res = await fetch(`${this.BASE}/rate_limit`, { headers: this.getHeaders() });
    if (!res.ok) throw new Error(`${res.status}`);
    const data = await res.json();
    return data.rate;
  }
};

// ─── Markdown → HTML (via marked.js) ───
function md2html(md, owner, repo) {
  if (!md) return '';
  const baseRaw = (owner && repo) ? `https://raw.githubusercontent.com/${owner}/${repo}/HEAD/` : '';
  const baseLink = (owner && repo) ? `https://github.com/${owner}/${repo}/blob/HEAD/` : '';
  const renderer = new marked.Renderer();
  renderer.image = function({ href, title, text }) {
    if (baseRaw && href && !href.match(/^https?:\/\//)) href = baseRaw + href;
    const t = title ? ` title="${esc(title)}"` : '';
    return `<img src="${esc(href)}" alt="${esc(text)}"${t} loading="lazy" style="max-width:100%">`;
  };
  renderer.link = function({ href, title, text }) {
    if (baseLink && href && !href.match(/^https?:\/\//) && !href.startsWith('#')) href = baseLink + href;
    const t = title ? ` title="${esc(title)}"` : '';
    return `<a href="${esc(href)}"${t} target="_blank" rel="noopener">${text}</a>`;
  };
  renderer.html = function({ text }) {
    if (baseRaw) {
      return text.replace(/(<img\s[^>]*src=["'])(?!https?:\/\/)([^"']+)(["'])/gi,
        (m, pre, url, post) => pre + baseRaw + url + post);
    }
    return text;
  };
  return marked.parse(md, { renderer, gfm: true, breaks: false });
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Language colors (common ones) ───
const LANG_COLORS = {
  Lua:'#000080',Python:'#3572A5',JavaScript:'#f1e05a',TypeScript:'#3178c6',
  Shell:'#89e051',C:'#555555','C++':'#f34b7d',Go:'#00ADD8',Rust:'#dea584',
  Java:'#b07219',Ruby:'#701516',HTML:'#e34c26',CSS:'#563d7c',Vim:'#199f4b',
  'Vim Script':'#199f4b',Makefile:'#427819',Zig:'#ec915c',Dart:'#00B4AB',
};

// ─── Time formatting ───
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const diff = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 2592000) return `${Math.floor(diff/86400)}d ago`;
  if (diff < 31536000) return `${Math.floor(diff/2592000)}mo ago`;
  return `${Math.floor(diff/31536000)}y ago`;
}
function shortDate(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

// ─── App ───
const app = {
  tab: 'plugins',
  sortMode: 'stars_desc',
  tabState: {
    plugins:  { query: '', minStars: 0, readmeSearch: false, includeForks: true },
    patches:  { query: '', minStars: 0, readmeSearch: true, includeForks: true }
  },
  readmeCache: {},
  data: { plugins: null, patches: null },
  loading: { plugins: false, patches: false },
  readmeLoading: {},

  QUERIES: {
    plugins: {
      topics: ['topic:koreader-plugin fork:true'],
      names: ['in:name ".koplugin" fork:true']
    },
    patches: {
      topics: ['topic:koreader-user-patch fork:true'],
      names: ['in:name "KOReader.patches" fork:true']
    }
  },

  get ts() { return this.tabState[this.tab]; },

  toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    this.applyTheme(current === 'light' ? 'dark' : 'light');
  },

  applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    document.getElementById('themeToggle').textContent = theme === 'light' ? '☀️' : '🌙';
    Storage.set('theme', theme);
  },

  init() {
    this.applyTheme(Storage.get('theme') || 'dark');
    const savedSort = Storage.get('sort_mode');
    if (savedSort) { this.sortMode = savedSort; document.getElementById('sortSelect').value = savedSort; }
    if (!Storage.persistent) {
      document.getElementById('statsBar').innerHTML = '⚠️ localStorage unavailable (file:// mode). Settings will not persist across sessions.';
    }
    this.syncControlsToTab();
    this.loadCachedData();
    if (!this.data.plugins && !this.data.patches) {
      this.refreshData();
    } else {
      this.render();
    }
  },

  syncControlsToTab() {
    const s = this.ts;
    document.getElementById('searchInput').value = s.query ? s.query : '';
    document.getElementById('minStarsInput').value = s.minStars || 0;
    document.getElementById('includeForks').checked = s.includeForks;
    document.getElementById('readmeSearch').checked = s.readmeSearch;
    this.updateFilterBanner();
  },

  updateFilterBanner() {
    const s = this.ts;
    const banner = document.getElementById('filterBanner');
    const text = document.getElementById('filterText');
    const parts = [];
    if (s.query) parts.push(`"${s.query}"`);
    if (s.minStars > 0) parts.push(`≥${s.minStars} ⭐`);
    if (!s.includeForks) parts.push('no forks');
    if (s.readmeSearch && s.query) parts.push('(+README)');
    if (parts.length > 0) {
      text.textContent = 'Active filter: ' + parts.join(' · ');
      banner.classList.add('visible');
    } else {
      banner.classList.remove('visible');
    }
  },

  loadCachedData() {
    const p = Storage.getJSON('cache_plugins');
    const pa = Storage.getJSON('cache_patches');
    if (p && p.repos) this.data.plugins = p.repos;
    if (pa && pa.repos) this.data.patches = pa.repos;
  },

  async fetchCategory(kind) {
    const queries = this.QUERIES[kind];
    const allQueries = [...queries.topics, ...queries.names];
    const seen = new Set();
    const results = [];

    for (const q of allQueries) {
      try {
        const repos = await GitHub.searchAllPages(q);
        for (const repo of repos) {
          const key = repo.full_name.toLowerCase();
          if (!seen.has(key)) {
            seen.add(key);
            results.push(repo);
          }
        }
      } catch (e) {
        console.error(`Query failed [${q}]:`, e);
      }
    }
    return results;
  },

  async refreshData() {
    const active = this.tab;
    this.loading[active] = true;
    this.render();

    try {
      const repos = await this.fetchCategory(active);
      this.data[active] = repos;
      Storage.setJSON(`cache_${active}`, { repos, ts: Date.now() });
    } catch (e) {
      console.error('Fetch error:', e);
    }

    this.loading[active] = false;
    this.render();
  },

  switchTab(tab) {
    this.tab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    this.syncControlsToTab();
    if (!this.data[tab] && !this.loading[tab]) {
      this.refreshData();
    } else {
      this.render();
    }
  },

  onSearchKeydown(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const value = e.target.value.trim();
      this.ts.query = value.toLowerCase();
      this.applyFilter();
    }
  },

  onMinStarsKeydown(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      this.ts.minStars = Math.max(0, parseInt(e.target.value) || 0);
      this.applyFilter();
    }
  },

  onMinStarsChange(value) {
    this.ts.minStars = Math.max(0, parseInt(value) || 0);
    this.updateFilterBanner();
    this.render();
  },

  async applyFilter() {
    const s = this.ts;
    if (s.readmeSearch && s.query) {
      this.showSearchOverlay('Searching READMEs...');
      await this.fetchReadmesForSearch();
      this.hideSearchOverlay();
    }
    this.updateFilterBanner();
    this.render();
  },

  clearFilter() {
    const s = this.ts;
    s.query = '';
    s.minStars = 0;
    s.includeForks = true;
    this.syncControlsToTab();
    this.render();
  },

  showSearchOverlay(msg) {
    const el = document.getElementById('searchOverlay');
    document.getElementById('searchOverlayText').textContent = msg || 'Searching...';
    el.classList.add('visible');
  },

  hideSearchOverlay() {
    document.getElementById('searchOverlay').classList.remove('visible');
  },

  onSortChange(value) {
    this.sortMode = value;
    Storage.set('sort_mode', value);
    this.render();
  },

  onIncludeForksToggle(checked) {
    this.ts.includeForks = checked;
    this.updateFilterBanner();
    this.render();
  },

  onReadmeSearchToggle(checked) {
    this.ts.readmeSearch = checked;
    if (checked && this.ts.query) {
      this.applyFilter();
    }
    this.updateFilterBanner();
    this.render();
  },

  async fetchReadmesForSearch() {
    const repos = this.data[this.tab];
    if (!repos) return;
    const pending = repos.filter(r => this.readmeCache[r.full_name] === undefined);
    if (pending.length === 0) return;
    for (const r of pending) this.readmeLoading[r.full_name] = true;
    this.render();
    const BATCH = 6;
    let done = 0;
    const total = pending.length;
    this.showSearchOverlay(`Searching READMEs... (0/${total})`);
    for (let i = 0; i < pending.length; i += BATCH) {
      const batch = pending.slice(i, i + BATCH);
      await Promise.allSettled(batch.map(async repo => {
        const key = repo.full_name;
        try {
          const [owner, name] = key.split('/');
          const content = await GitHub.fetchReadme(owner, name);
          this.readmeCache[key] = content.toLowerCase();
        } catch (e) {
          this.readmeCache[key] = '';
        }
        this.readmeLoading[key] = false;
        done++;
        document.getElementById('searchOverlayText').textContent = `Searching READMEs... (${done}/${total})`;
      }));
      this.render();
    }
  },

  getSortedRepos(repos) {
    if (!repos) return [];
    const list = [...repos];
    const mode = this.sortMode;
    list.sort((a, b) => {
      if (mode === 'stars_desc') {
        if (b.stargazers_count !== a.stargazers_count) return b.stargazers_count - a.stargazers_count;
        if (a.pushed_at !== b.pushed_at) return new Date(b.pushed_at) - new Date(a.pushed_at);
        return (a.name || '').localeCompare(b.name || '');
      }
      if (mode === 'updated_desc') {
        if (a.pushed_at !== b.pushed_at) return new Date(b.pushed_at) - new Date(a.pushed_at);
        if (b.stargazers_count !== a.stargazers_count) return b.stargazers_count - a.stargazers_count;
        return (a.name || '').localeCompare(b.name || '');
      }
      if (mode === 'created_desc') {
        if (a.created_at !== b.created_at) return new Date(b.created_at) - new Date(a.created_at);
        if (b.stargazers_count !== a.stargazers_count) return b.stargazers_count - a.stargazers_count;
        return (a.name || '').localeCompare(b.name || '');
      }
      if (mode === 'name_asc') {
        const na = (a.name || '').toLowerCase(), nb = (b.name || '').toLowerCase();
        if (na !== nb) return na.localeCompare(nb);
        if (b.stargazers_count !== a.stargazers_count) return b.stargazers_count - a.stargazers_count;
        return new Date(b.pushed_at) - new Date(a.pushed_at);
      }
      return 0;
    });
    return list;
  },

  getFilteredRepos(repos) {
    const s = this.ts;
    let list = repos;
    if (!s.includeForks) {
      list = list.filter(r => !r.fork);
    }
    if (s.minStars > 0) {
      list = list.filter(r => (r.stargazers_count || 0) >= s.minStars);
    }
    if (!s.query) return list;
    const words = s.query.split(/\s+/).filter(Boolean);
    if (words.length === 0) return list;
    return list.filter(r => {
      const name = (r.full_name || '').toLowerCase();
      const desc = (r.description || '').toLowerCase();
      const topics = (r.topics || []).join(' ').toLowerCase();
      const readmeTxt = s.readmeSearch ? (this.readmeCache[r.full_name] || '') : '';
      const haystack = name + ' ' + desc + ' ' + topics + (readmeTxt ? ' ' + readmeTxt : '');
      return words.every(w => haystack.includes(w));
    });
  },

  render() {
    const repos = this.data[this.tab];
    const isLoading = this.loading[this.tab];
    const listEl = document.getElementById('repoList');
    const statsEl = document.getElementById('statsBar');

    if (isLoading) {
      listEl.innerHTML = `<div class="state-msg"><div class="spinner"></div><p style="margin-top:.75rem">Fetching ${this.tab}...</p></div>`;
      statsEl.textContent = '';
      return;
    }

    if (!repos) {
      listEl.innerHTML = `<div class="state-msg"><div class="icon">📦</div><p>No data yet. Click 🔄 to fetch.</p></div>`;
      statsEl.textContent = '';
      return;
    }

    const sorted = this.getSortedRepos(repos);
    const filtered = this.getFilteredRepos(sorted);


    const readmeLoadingCount = Object.values(this.readmeLoading).filter(Boolean).length;
    let statsText = `${filtered.length} of ${repos.length} repos`;
    if (readmeLoadingCount > 0) statsText += ` · Fetching READMEs (${readmeLoadingCount} remaining)...`;
    const cacheInfo = Storage.getJSON(`cache_${this.tab}`);
    if (cacheInfo && cacheInfo.ts) statsText += ` · Last fetched: ${shortDate(new Date(cacheInfo.ts).toISOString())}`;
    statsEl.textContent = statsText;

    if (filtered.length === 0) {
      listEl.innerHTML = `<div class="state-msg"><div class="icon">🔍</div><p>No repos match your search.</p></div>`;
      return;
    }

    listEl.innerHTML = filtered.map(r => this.renderCard(r)).join('');
  },

  renderCard(repo) {
    const owner = repo.owner?.login || '';
    const name = repo.name || '';
    const fullName = repo.full_name || `${owner}/${name}`;
    const desc = repo.description ? esc(repo.description) : '<span style="color:var(--text3)">No description</span>';
    const stars = repo.stargazers_count || 0;
    const lang = repo.language || '';
    const langColor = LANG_COLORS[lang] || '#888';
    const topics = (repo.topics || []).slice(0, 15);
    const updatedLabel = timeAgo(repo.pushed_at);
    const createdLabel = shortDate(repo.created_at);

    return `
    <div class="repo-card">
      <div class="repo-card-header">
        <div class="repo-name"><a href="${repo.html_url}" target="_blank" rel="noopener">${esc(fullName)}</a>${repo.fork ? ` <span class="fork-badge" onclick="app.showForkSource(event,'${esc(owner)}','${esc(name)}')">🔀 Fork<span class="fork-popup" id="fork-pop-${esc(owner)}-${esc(name)}"></span></span>` : ''}</div>
        <div class="repo-stars">⭐ ${stars}</div>
      </div>
      <div class="repo-desc">${desc}</div>
      <div class="repo-meta">
        ${lang ? `<span class="repo-meta-item"><span class="lang-dot" style="background:${langColor}"></span> ${esc(lang)}</span>` : ''}
        <span class="repo-meta-item">📅 Created ${createdLabel}</span>
        <span class="repo-meta-item">🕐 Updated ${updatedLabel}</span>
        ${repo.license?.spdx_id ? `<span class="repo-meta-item">📄 ${esc(repo.license.spdx_id)}</span>` : ''}
      </div>
      ${topics.length ? `<div class="repo-topics">${topics.map(t => `<span class="topic-tag">${esc(t)}</span>`).join('')}</div>` : ''}
      <div class="repo-actions">
        <button class="btn-secondary btn-sm" onclick="app.showReadme('${esc(owner)}','${esc(name)}')">📖 README</button>
        ${this.tab === 'patches' ? `<button class="btn-secondary btn-sm" onclick="app.showPatchFiles('${esc(owner)}','${esc(name)}')">📄 Patches</button>` : ''}
        <a href="${repo.html_url}" target="_blank" rel="noopener"><button class="btn-secondary btn-sm">🔗 GitHub</button></a>
      </div>
    </div>`;
  },

  // ─── README ───
  async showReadme(owner, repo) {
    const modal = document.getElementById('readmeModal');
    const titleEl = document.getElementById('readmeTitle');
    const contentEl = document.getElementById('readmeContent');
    titleEl.textContent = `${owner}/${repo} — README`;
    contentEl.innerHTML = '<div class="state-msg"><div class="spinner"></div></div>';
    modal.classList.add('open');

    try {
      const content = await GitHub.fetchReadme(owner, repo);
      contentEl.innerHTML = md2html(content, owner, repo);
    } catch (e) {
      contentEl.innerHTML = `<div class="state-msg"><p>Failed to load README: ${esc(e.message)}</p></div>`;
    }
  },

  closeReadme() {
    document.getElementById('readmeModal').classList.remove('open');
  },

  // ─── Fork Source ───
  forkSourceCache: {},
  async showForkSource(e, owner, repo) {
    e.stopPropagation();
    const popId = `fork-pop-${owner}-${repo}`;
    const pop = document.getElementById(popId);
    if (!pop) return;
    // Toggle off if already visible
    if (pop.classList.contains('visible')) { pop.classList.remove('visible'); return; }
    // Close any other open fork popups
    document.querySelectorAll('.fork-popup.visible').forEach(p => p.classList.remove('visible'));
    const key = `${owner}/${repo}`;
    if (this.forkSourceCache[key]) {
      pop.innerHTML = this.forkSourceCache[key];
      pop.classList.add('visible');
      return;
    }
    pop.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px"></span>';
    pop.classList.add('visible');
    try {
      const data = await GitHub.request(`/repos/${owner}/${repo}`);
      const parent = data.parent;
      if (parent) {
        const html = `Forked from <a href="${parent.html_url}" target="_blank" rel="noopener">${esc(parent.full_name)}</a> ⭐ ${parent.stargazers_count || 0}`;
        this.forkSourceCache[key] = html;
        pop.innerHTML = html;
      } else {
        pop.innerHTML = 'Fork source unknown';
        this.forkSourceCache[key] = 'Fork source unknown';
      }
    } catch (err) {
      pop.innerHTML = 'Failed to load source';
    }
  },

  // ─── Patch Files ───
  async showPatchFiles(owner, repo) {
    const modal = document.getElementById('patchesModal');
    const titleEl = document.getElementById('patchesTitle');
    const contentEl = document.getElementById('patchesContent');
    titleEl.textContent = `${owner}/${repo} — Patch Files`;
    contentEl.innerHTML = '<div class="state-msg"><div class="spinner"></div></div>';
    modal.classList.add('open');

    try {
      const tree = await GitHub.fetchRepoTree(owner, repo);
      const luaFiles = tree.filter(f => f.type === 'blob' && f.path.endsWith('.lua') && f.path.split('/').pop().startsWith('2-'));
      if (luaFiles.length === 0) {
        contentEl.innerHTML = '<div class="state-msg"><p>No .lua files found.</p></div>';
        return;
      }
      const grouped = {};
      for (const f of luaFiles) {
        const parts = f.path.split('/');
        const fileName = parts.pop();
        const dir = parts.length > 0 ? parts.join('/') : '/';
        if (!grouped[dir]) grouped[dir] = [];
        grouped[dir].push({ name: fileName, path: f.path, url: `https://github.com/${owner}/${repo}/blob/HEAD/${f.path}` });
      }
      let html = `<p style="font-size:.8rem;color:var(--text3);margin-bottom:.75rem">${luaFiles.length} .lua file(s)</p>`;
      const dirs = Object.keys(grouped).sort();
      for (const dir of dirs) {
        if (dirs.length > 1 || dir !== '/') {
          html += `<div style="font-size:.8rem;color:var(--text3);margin-top:.75rem;margin-bottom:.3rem;font-weight:600">${esc(dir === '/' ? 'Root' : dir)}/</div>`;
        }
        for (const f of grouped[dir]) {
          html += `<div style="padding:.3rem .5rem;border-bottom:1px solid var(--border);font-size:.88rem"><a href="${f.url}" target="_blank" rel="noopener" style="color:var(--accent2)">${esc(f.name)}</a></div>`;
        }
      }
      contentEl.innerHTML = html;
    } catch (e) {
      contentEl.innerHTML = `<div class="state-msg"><p>Failed to load file tree: ${esc(e.message)}</p></div>`;
    }
  },

  closePatchFiles() {
    document.getElementById('patchesModal').classList.remove('open');
  },

  // ─── Settings ───
  openSettings() {
    const token = Storage.get('github_pat') || '';
    document.getElementById('patInput').value = token;
    document.getElementById('tokenStatus').innerHTML = '';
    document.getElementById('settingsModal').classList.add('open');
  },

  closeSettings() {
    document.getElementById('settingsModal').classList.remove('open');
  },

  saveSettings() {
    const token = document.getElementById('patInput').value.trim();
    if (token) {
      Storage.set('github_pat', token);
    } else {
      Storage.remove('github_pat');
    }
    this.closeSettings();
  },

  async testToken() {
    const statusEl = document.getElementById('tokenStatus');
    const token = document.getElementById('patInput').value.trim();
    if (!token) { statusEl.innerHTML = '<span class="token-status token-fail">No token entered</span>'; return; }
    statusEl.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px"></span>';
    const origToken = Storage.get('github_pat');
    Storage.set('github_pat', token);
    try {
      const rate = await GitHub.testAuth();
      statusEl.innerHTML = `<span class="token-status token-ok">✓ Valid — ${rate.remaining}/${rate.limit} requests remaining</span>`;
    } catch (e) {
      statusEl.innerHTML = `<span class="token-status token-fail">✕ Invalid token (${e.message})</span>`;
      if (origToken) Storage.set('github_pat', origToken); else Storage.remove('github_pat');
    }
  }
};

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// Close modals on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
});

// ─── Scroll hide/show header + controls ───
(() => {
  const header = document.querySelector('.header');
  const controls = document.querySelector('.controls');
  const filterBanner = document.getElementById('filterBanner');
  let lastY = 0;
  let ticking = false;
  const updatePositions = (hide) => {
    if (hide) {
      header.classList.add('hidden');
      controls.classList.add('hidden');
      filterBanner.classList.add('hidden');
      controls.style.top = '0px';
      filterBanner.style.top = '0px';
    } else {
      header.classList.remove('hidden');
      controls.classList.remove('hidden');
      filterBanner.classList.remove('hidden');
      const hH = header.offsetHeight;
      controls.style.top = hH + 'px';
      filterBanner.style.top = (hH + controls.offsetHeight) + 'px';
    }
  };
  const SPEED_THRESHOLD = 30;
  const onScroll = () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const y = window.scrollY;
      const delta = lastY - y;
      if (y <= 120) {
        updatePositions(false);
      } else if (y > lastY) {
        updatePositions(true);
      } else if (delta > SPEED_THRESHOLD) {
        updatePositions(false);
      }
      lastY = y;
      ticking = false;
    });
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  // Set initial positions
  requestAnimationFrame(() => updatePositions(false));
})();

// Close fork popups on outside click
document.addEventListener('click', () => {
  document.querySelectorAll('.fork-popup.visible').forEach(p => p.classList.remove('visible'));
});

// Boot
app.init();
</script>
